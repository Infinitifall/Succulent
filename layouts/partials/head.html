<head>
    <meta charset="utf-8">

    {{ $css := resources.Get "scss/malis.scss" | css.Sass }}
    <link rel='stylesheet' type='text/css' href='{{ printf "%s%s%s" ($css.RelPermalink) ("?v=") (.Site.Params.version_string) }}'>
  
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:locale" content="en_US">
    <meta property="og:type" content="website">
  
    <link rel="icon" type="image/x-icon" href='{{ "/images/favicon.webp" | absURL }}'>
    <meta property="og:image" content='{{ "/images/logo.jpeg" | absURL }}'>

    <title>{{ .Title }} - {{ .Site.Params.siteName }}</title>
    <meta name="title" content='{{ .Title }}'>
    <meta property="og:title" content='{{ .Title }}'>
  
    <meta property="article:published_time " content='{{ .Date }}'>

    {{ if isset .Params "author" }}
    <meta name="author" content='{{ .Params.author }}'>
    {{ end }}
    
    {{ if isset .Params "excerpt" }}
    <meta name="description" content='{{ .Params.excerpt }}'>
    <meta property="og:description" content='{{ .Params.excerpt }}'>
    {{ end }}

    <meta name="twitter:card" content="summary">

    <meta property="og:url" content="{{ $.Site.BaseURL }}">
      <link rel="canonical" href="{{ $.Site.BaseURL }}">

    {{ if and (isset .Params "latex") (.Params.latex)}}
    <link rel="stylesheet" href='{{ "katex/katex.min.css" | absURL}}'>
    <script defer src='{{ "katex/katex.min.js" | absURL}}'></script>
    <script defer src='{{ "katex/contrib/auto-render.min.js" | absURL}}' onload="renderMathInElement(document.body);"></script>
    {{ end }}
</head>
